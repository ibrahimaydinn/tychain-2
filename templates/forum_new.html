<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New post — Tychain Forum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

{% with active='forum' %}{% include '_nav.html' %}{% endwith %}

<main class="page" style="max-width:720px">
  <h1 class="page-title">New post</h1>
  <p class="page-subtitle">Share a chart or open a discussion. Members can reply.</p>

  {% if error %}<div class="alert alert-error" role="alert">{{ error }}</div>{% endif %}

  <form class="card" method="POST" action="/forum/new" enctype="multipart/form-data" style="display:flex;flex-direction:column;gap:var(--space-4)">
    <input type="hidden" name="csrf" value="{{ csrf }}">
    <div>
      <label>Title</label>
      <input type="text" name="title" maxlength="200" required value="{{ title or '' }}" placeholder="What's your post about?">
    </div>
    <div>
      <label>Body</label>
      <textarea name="body" required rows="8" placeholder="Add details, links, or analysis…">{{ body or '' }}</textarea>
      <p class="hint">Plain text. Up to 12 KB.</p>
    </div>
    <div>
      <label>Image (optional)</label>
      <input type="file" name="image" accept="image/png,image/jpeg,image/gif,image/webp" style="background:transparent;border:none;padding:0;color:var(--text-secondary)">
      <p class="hint">PNG, JPG, GIF or WebP. Max 1.5 MB.</p>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:var(--space-2);padding-top:var(--space-2);border-top:1px solid var(--border)">
      <a class="btn btn-secondary" href="/forum">Cancel</a>
      <button class="btn" type="submit">Publish</button>
    </div>
  </form>
</main>

<style>
.hint { font-size: var(--fs-xs); color: var(--text-muted); margin-top: 4px; }
</style>

</body>
</html>
