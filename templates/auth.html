<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Tychain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

{% with active='analysis' %}{% include '_nav.html' %}{% endwith %}

<main class="auth-page">
  <div class="auth-card">
    <header class="auth-head">
      <h1>Welcome to Tychain</h1>
      <p>Open an account to track positions and receive model signals.</p>
    </header>

    <div class="auth-tabs" role="tablist">
      <button class="auth-tab {% if tab == 'login'  %}active{% endif %}" type="button" onclick="showTab('login')"  role="tab">Sign in</button>
      <button class="auth-tab {% if tab == 'signup' %}active{% endif %}" type="button" onclick="showTab('signup')" role="tab">Create account</button>
    </div>

    <!-- ── Sign in ───────────────────────────────────────────────── -->
    <section id="pane-login" class="auth-pane" {% if tab != 'login' %}hidden{% endif %}>
      <div id="login-error"   class="alert alert-error"   role="alert" hidden></div>
      <div id="login-success" class="alert alert-info"    role="status" hidden></div>
      <form id="form-login" onsubmit="submitAuth(event,'login')" novalidate>
        <input type="hidden" name="action" value="login">
        <input type="hidden" name="csrf"   value="{{ csrf }}">
        <div class="field">
          <label>Email</label>
          <input type="email" name="email" required autocomplete="email" placeholder="name@company.com">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn auth-submit" id="btn-login">Sign in</button>
      </form>
    </section>

    <!-- ── Create account ────────────────────────────────────────── -->
    <section id="pane-signup" class="auth-pane" {% if tab != 'signup' %}hidden{% endif %}>
      <div id="signup-error"   class="alert alert-error" role="alert" hidden></div>
      <div id="signup-success" class="alert alert-info"  role="status" hidden></div>
      <form id="form-signup" onsubmit="submitAuth(event,'signup')" novalidate>
        <input type="hidden" name="action" value="signup">
        <input type="hidden" name="csrf"   value="{{ csrf }}">
        <div class="field">
          <label>Email</label>
          <input type="email" name="email" required autocomplete="email" placeholder="name@company.com">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" id="pw" required minlength="8"
                 autocomplete="new-password" oninput="updatePwStrength(this.value)">
          <div class="pw-bar" aria-hidden="true"><div class="pw-fill" id="pw-fill"></div></div>
          <div class="hint" id="pw-hint">Minimum 8 characters.</div>
        </div>
        <div class="field">
          <label>Confirm password</label>
          <input type="password" name="password2" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn auth-submit" id="btn-signup">Create account</button>
      </form>
    </section>
  </div>
</main>

<style>
.auth-page  { min-height: calc(100vh - 60px); display: flex; align-items: center; justify-content: center; padding: var(--space-6) var(--space-4); }
.auth-card  { width: 100%; max-width: 440px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); }
.auth-head  { padding: var(--space-6) var(--space-6) var(--space-4); border-bottom: 1px solid var(--border); }
.auth-head h1 { font-size: var(--fs-xl); font-weight: 600; margin-bottom: 4px; letter-spacing: -0.01em; }
.auth-head p  { color: var(--text-secondary); font-size: var(--fs-sm); }
.auth-tabs  { display: flex; padding: 0 var(--space-6); border-bottom: 1px solid var(--border); gap: var(--space-5); }
.auth-tab   { background: none; border: none; padding: 14px 0; color: var(--text-secondary); font: 500 var(--fs-sm)/1.2 'Inter',sans-serif; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 120ms ease, border-color 120ms ease; }
.auth-tab.active { color: var(--text); border-bottom-color: var(--accent); }
.auth-tab:hover:not(.active) { color: var(--text); }
.auth-pane  { padding: var(--space-5) var(--space-6) var(--space-6); }
.field      { margin-bottom: var(--space-4); }
.auth-submit { width: 100%; justify-content: center; padding: 11px; font-weight: 600; }
.alert      { margin-bottom: var(--space-4); }
.hint       { color: var(--text-muted); font-size: var(--fs-xs); margin-top: 6px; }
.pw-bar     { height: 2px; background: var(--border-strong); margin-top: 8px; border-radius: 1px; overflow: hidden; }
.pw-fill    { height: 100%; width: 0; background: var(--accent); transition: width 200ms ease, background 200ms ease; }
</style>

<script>
function showTab(t) {
  document.getElementById('pane-login').hidden  = t !== 'login';
  document.getElementById('pane-signup').hidden = t !== 'signup';
  document.querySelectorAll('.auth-tab').forEach((b,i) =>
    b.classList.toggle('active', (i===0 && t==='login') || (i===1 && t==='signup')));
}

async function submitAuth(e, type) {
  e.preventDefault();
  const form  = e.target;
  const btn   = document.getElementById('btn-' + type);
  const errEl = document.getElementById(type + '-error');
  const okEl  = document.getElementById(type + '-success');
  errEl.hidden = okEl.hidden = true;
  const labelDefault = type === 'login' ? 'Sign in' : 'Create account';
  btn.disabled = true;
  btn.textContent = type === 'login' ? 'Signing in…' : 'Creating account…';
  try {
    const res = await fetch('/api/auth', { method: 'POST', body: new FormData(form), credentials: 'include' });
    const data = await res.json();
    if (data.ok) {
      okEl.textContent = type === 'login' ? 'Signed in. Redirecting…' : 'Account created. Redirecting…';
      okEl.hidden = false;
      setTimeout(() => { window.location.href = data.redirect; }, 500);
    } else {
      errEl.textContent = data.error || 'Request failed.';
      errEl.hidden = false;
      btn.disabled = false;
      btn.textContent = labelDefault;
    }
  } catch {
    errEl.textContent = 'Network error. Please try again.';
    errEl.hidden = false;
    btn.disabled = false;
    btn.textContent = labelDefault;
  }
}

const PW_LEVELS = [
  { pct: 0,   color: 'var(--negative)',  label: 'Minimum 8 characters.' },
  { pct: 20,  color: 'var(--negative)',  label: 'Weak — add length and variety.' },
  { pct: 40,  color: 'var(--warning)',   label: 'Fair.' },
  { pct: 60,  color: 'var(--warning)',   label: 'Good.' },
  { pct: 80,  color: 'var(--positive)',  label: 'Strong.' },
  { pct: 100, color: 'var(--positive)',  label: 'Very strong.' },
];
function updatePwStrength(val) {
  let s = 0;
  if (val.length >= 8)            s++;
  if (val.length >= 12)           s++;
  if (/[A-Z]/.test(val))          s++;
  if (/[0-9]/.test(val))          s++;
  if (/[^A-Za-z0-9]/.test(val))   s++;
  const lvl = PW_LEVELS[s] || PW_LEVELS[0];
  document.getElementById('pw-fill').style.width      = lvl.pct + '%';
  document.getElementById('pw-fill').style.background = lvl.color;
  const hint = document.getElementById('pw-hint');
  hint.textContent = lvl.label;
  hint.style.color = lvl.color === 'var(--negative)' ? 'var(--text-muted)' : lvl.color;
}
</script>

</body>
</html>
